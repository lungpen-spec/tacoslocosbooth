<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACOS LOCOS - 祕製豬肉加購限定</title>
    <style>
        /* 視覺區隔：熱情火山熔岩風 (對比原本的亡靈紫) */
        body { 
            background-color: #2b0000; 
            color: #ffcc00; 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        h1 { 
            color: #ff4500; 
            text-shadow: 2px 2px #000; 
            letter-spacing: 2px;
        }
        .promo-box { 
            border: 3px solid #ff4500; 
            padding: 20px; 
            margin: 20px auto; 
            width: 85%; 
            background: #4a0000; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.5);
        }
        p.highlight { color: #ffffff; font-weight: bold; font-size: 1.1em; }
        select { 
            width: 90%; 
            padding: 12px; 
            font-size: 16px; 
            margin: 15px 0; 
            background: #ffdead; 
            border: 2px solid #ff4500;
            border-radius: 8px;
        }
        button {
            padding: 15px 30px; 
            background: #ff4500; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>💀 祕製慢燉豬肉限定通道 💀</h1>
    
    <div class="promo-box">
        <p>慢火燉煮 12 小時的職人靈魂，現正限定販售！</p>
        <p class="highlight">Amigo！這份口感是起司口味無法比擬的極致層次！</p>
    </div>

    <form id="orderForm">
        <label>選購主餐 (已為您鎖定加購)：</label>
        <select id="flavor">
            <option value="pork" selected>🔥 祕製香料慢燉豬肉 (升級版)</option>
        </select>
        <br>
        <input type="text" placeholder="輸入您的手機號碼" required style="width: 85%; padding: 10px; border-radius: 8px;">
        <br>
        <button type="submit">確認下單，準備開吃！</button>
    </form>

    <script>
        window.onload = function() {
            // 自動提示並禁止修改口味，鎖定加購項目
            document.getElementById('flavor').disabled = true;
            console.log("VIP 通道已啟動，豬肉選項已鎖定。");
        };
    </script>
</body>
</html>
